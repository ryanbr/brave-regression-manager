name: Release

# Two ways to cut a release:
#
#   • Push a `v*` tag — the existing flow. The matrix runs and publishes
#     binaries to the GitHub Release for that tag.
#
#   • Click "Run workflow" → pick `patch` / `minor` / `major`. The bump
#     job edits Cargo.toml/Cargo.lock, commits, tags, and pushes; then
#     the matrix builds the new tag and publishes.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump (patch / minor / major)'
        type: choice
        options: [patch, minor, major]
        default: patch
      prerelease:
        description: 'Mark Release as pre-release'
        type: boolean
        default: false

permissions:
  contents: write   # required for softprops/action-gh-release + commit/tag push

jobs:
  # On manual runs, bump the workspace version, commit, tag, push.
  # Pushes from GITHUB_TOKEN don't trigger downstream workflow runs, so
  # there's no double-fire — the build job below uses the bumped commit
  # within this same run.
  bump:
    name: Bump + tag
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.do.outputs.tag }}
      sha: ${{ steps.do.outputs.sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # need full history to push back
          persist-credentials: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-edit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-edit

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - id: do
        name: Bump, commit, tag, push
        run: |
          set -euo pipefail
          # `cargo set-version` updates both Cargo.toml and Cargo.lock.
          cargo set-version --bump '${{ inputs.bump }}'
          new=$(cargo metadata --no-deps --format-version 1 \
                | python3 -c "import json,sys; print(json.load(sys.stdin)['packages'][0]['version'])")
          tag="v$new"
          echo "Bumped to $tag"
          git add Cargo.toml Cargo.lock
          git commit -m "Release $tag [skip ci]"
          git tag "$tag"
          git push origin HEAD --tags
          {
            echo "tag=$tag"
            echo "sha=$(git rev-parse HEAD)"
          } >> "$GITHUB_OUTPUT"

  # Generate a changelog from `git log <prev-tag>..<current>` once, then
  # share it with the build matrix so the GitHub Release body shows what
  # actually landed since the last release. Saves the matrix from running
  # `git log` three times and keeps the body deterministic.
  notes:
    name: Release notes
    runs-on: ubuntu-22.04
    needs: [bump]
    if: |
      always()
      && (needs.bump.result == 'success' || needs.bump.result == 'skipped')
    outputs:
      body: ${{ steps.gen.outputs.body }}
      tag:  ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.bump.outputs.sha || github.ref }}
          fetch-depth: 0    # need full history for `git describe --tags`

      - id: tag
        shell: bash
        run: echo "tag=${{ needs.bump.outputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - id: gen
        shell: bash
        run: |
          set -euo pipefail
          cur="${{ steps.tag.outputs.tag }}"
          # If the tag exists in the checkout (tag-push run), use it as
          # the upper bound; otherwise (bump just ran on this commit) the
          # tag refers to HEAD.
          if git rev-parse --verify "refs/tags/$cur" >/dev/null 2>&1; then
            upper="$cur"
          else
            upper="HEAD"
          fi
          prev=$(git describe --tags --abbrev=0 "$upper^" 2>/dev/null || true)

          repo="${{ github.server_url }}/${{ github.repository }}"
          if [ -z "$prev" ]; then
            header="## Initial release"
            range="$upper"
            compare_line=""
          else
            header="## Changes since $prev"
            range="$prev..$upper"
            compare_line="**Full diff**: $repo/compare/$prev...$cur"
          fi

          # Skip the `Release vX.Y.Z [skip ci]` auto-commits the bump
          # job creates — they're noise in user-facing notes.
          {
            echo "$header"
            echo
            git log --pretty=format:'- %s' "$range" \
              | grep -v -E '^\- Release v[0-9]+\.' \
              | head -200 \
              || true
            echo
            echo
            [ -n "$compare_line" ] && echo "$compare_line"
          } > changelog.md
          echo "----- generated changelog -----"
          cat changelog.md
          echo "----- end -----"

          # Multiline output via heredoc syntax.
          {
            echo 'body<<CHANGELOG_EOF'
            cat changelog.md
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

  build:
    needs: [bump, notes]
    # Run when triggered by a tag push (bump skipped) OR after a successful
    # bump on a manual run, AND the notes job has produced a body.
    if: |
      always()
      && (needs.bump.result == 'success' || needs.bump.result == 'skipped')
      && needs.notes.result == 'success'
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os:     ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext:    ''
            archive: tar.gz
          - os:     windows-latest
            target: x86_64-pc-windows-msvc
            ext:    .exe
            archive: zip
          - os:     macos-14            # Apple Silicon runner
            target: aarch64-apple-darwin
            ext:    ''
            archive: tar.gz

    steps:
      # On manual runs, check out the freshly-bumped commit; otherwise
      # the tag we were triggered by.
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.bump.outputs.sha || github.ref }}

      # Resolve the release tag once so every later step (archive name,
      # workflow-artifact name, GitHub Release upload) uses the same value.
      # `needs.bump.outputs.tag` is populated on workflow_dispatch runs;
      # `github.ref_name` is the pushed tag on push-tag runs.
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          tag="${{ needs.bump.outputs.tag || github.ref_name }}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release tag = $tag"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # eframe's `glow` backend + arboard's clipboard backends + rfd's
      # xdg-portal backend all need a few system libs on Linux.
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev \
            libgtk-3-dev

      # Floor the macOS build at Big Sur (the first Apple Silicon version)
      # so the binary runs on every supported arm64 Mac, not just the
      # runner's macOS version.
      - name: Build
        env:
          MACOSX_DEPLOYMENT_TARGET: '11.0'
        run: cargo build --release --locked --target ${{ matrix.target }}

      # Wrap the binary in a minimal .app bundle. macOS Gatekeeper has
      # progressively tightened around bare CLI Mach-O downloads — on
      # macOS 14+ AppleSystemPolicy refuses to exec one even after
      # `xattr -d com.apple.quarantine`. A .app bundle gets the standard
      # right-click → Open / "Allow Anyway" UX instead.
      - name: Build macOS .app bundle
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          app="target/${{ matrix.target }}/release/Brave Regression Manager.app"
          rm -rf "$app"
          mkdir -p "$app/Contents/MacOS" "$app/Contents/Resources"
          cp "target/${{ matrix.target }}/release/brave-regress" "$app/Contents/MacOS/brave-regress"
          cat > "$app/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>            <string>brave-regress</string>
            <key>CFBundleIdentifier</key>            <string>dev.ryanbr.brave-regression-manager</string>
            <key>CFBundleName</key>                  <string>Brave Regression Manager</string>
            <key>CFBundleDisplayName</key>           <string>Brave Regression Manager</string>
            <key>CFBundlePackageType</key>           <string>APPL</string>
            <key>CFBundleShortVersionString</key>    <string>0.1.0</string>
            <key>CFBundleVersion</key>               <string>0.1.0</string>
            <key>LSMinimumSystemVersion</key>        <string>11.0</string>
            <key>NSHighResolutionCapable</key>       <true/>
            <key>NSPrincipalClass</key>              <string>NSApplication</string>
            <key>NSSupportsAutomaticGraphicsSwitching</key> <true/>
          </dict>
          </plist>
          PLIST
          codesign --force --deep --sign - "$app"
          codesign -dv "$app" 2>&1
          ls -la "$app/Contents"

      - name: Stage archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          stage=staging
          mkdir -p "$stage"
          name="brave-regress-${{ steps.tag.outputs.tag }}-${{ matrix.target }}"
          mkdir -p "$stage/$name"
          cp "target/${{ matrix.target }}/release/brave-regress${{ matrix.ext }}" "$stage/$name/"
          cp README.md "$stage/$name/" || true
          cp LICENSE  "$stage/$name/" 2>/dev/null || true
          ( cd "$stage" && tar -czf "$name.tar.gz" "$name" )
          ls -la "$stage"

      - name: Stage archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stage = "staging"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          $name  = "brave-regress-${{ steps.tag.outputs.tag }}-${{ matrix.target }}"
          $dir   = Join-Path $stage $name
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/brave-regress.exe" $dir
          if (Test-Path README.md) { Copy-Item README.md $dir }
          if (Test-Path LICENSE)   { Copy-Item LICENSE  $dir }
          Compress-Archive -Path $dir -DestinationPath (Join-Path $stage "$name.zip") -Force
          Get-ChildItem $stage

      # Always attach the archives to the workflow run too — useful for
      # grabbing binaries from a failed/partial run without checking the
      # Releases page.
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: brave-regress-${{ steps.tag.outputs.tag }}-${{ matrix.target }}
          path: |
            staging/*.tar.gz
            staging/*.zip
          if-no-files-found: error
          retention-days: 14

      # Publish to the GitHub Release. Tag was resolved earlier; reuse it
      # so the version embedded in the archive name matches the Release
      # it gets attached to. Body comes from the `notes` job — three
      # matrix jobs all set the same body, softprops takes the first.
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          body: ${{ needs.notes.outputs.body }}
          append_body: false
          files: |
            staging/*.tar.gz
            staging/*.zip
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          # Our `notes` job already produced the user-facing body — turn
          # off GitHub's auto-generated notes so we don't duplicate.
          generate_release_notes: false
